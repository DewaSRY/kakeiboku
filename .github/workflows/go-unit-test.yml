name: Go Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root" --health-interval 5s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: ./apps/apiportal
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Ensure Docker is running
        run: |
          docker info

      - name: Run unit tests (with testcontainers)
        env:
          DB_URI: postgresql://root:password@localhost:5432/mydb?sslmode=disable
        run: go test ./...
