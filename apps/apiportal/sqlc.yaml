version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/queries"
    schema: "internal/migrations"
    gen:
      go:
        package: "services"
        out: "internal/services"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          